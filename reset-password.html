<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CrystalFlow Miami</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0A1628;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 420px;
            width: 100%;
        }
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo h1 {
            font-family: 'Instrument Serif', Georgia, serif;
            font-size: 36px;
            color: #FFFFFF;
            margin-bottom: 4px;
        }
        .logo span {
            color: #00A5A8;
            font-size: 16px;
        }
        .card {
            background: #1F2937;
            border: 1px solid #374151;
            border-radius: 16px;
            padding: 32px;
        }
        .card h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .card p {
            color: #9CA3AF;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        label {
            display: block;
            font-size: 14px;
            color: #D1D5DB;
            margin-bottom: 6px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #0A1628;
            border: 1px solid #374151;
            border-radius: 8px;
            color: #FFFFFF;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
        }
        input:focus {
            border-color: #00A5A8;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #00A5A8;
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn:hover { background: #008A8C; }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error {
            color: #EF4444;
            font-size: 14px;
            text-align: center;
            margin-bottom: 12px;
            display: none;
        }
        .success {
            text-align: center;
            display: none;
        }
        .success h3 {
            color: #10B981;
            font-size: 20px;
            margin-bottom: 8px;
        }
        .success p {
            color: #9CA3AF;
            margin-bottom: 24px;
        }
        .success a {
            color: #00A5A8;
            text-decoration: none;
        }
        .success a:hover { text-decoration: underline; }
        .password-hint {
            color: #6B7280;
            font-size: 12px;
            margin-top: -8px;
            margin-bottom: 16px;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>CrystalFlow</h1>
            <span>Miami</span>
        </div>
        
        <div class="card" id="resetForm">
            <h2>Set New Password</h2>
            <p>Enter your new password below.</p>
            
            <div class="error" id="errorMsg"></div>
            
            <label for="password">New Password</label>
            <input type="password" id="password" placeholder="Enter new password" autocomplete="new-password">
            <p class="password-hint">Must be at least 6 characters</p>
            
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm new password" autocomplete="new-password">
            
            <button class="btn" id="submitBtn" onclick="handleReset()">Update Password</button>
        </div>
        
        <div class="success" id="successMsg">
            <h3>Password Updated</h3>
            <p>Your password has been successfully changed. You can now sign in with your new password.</p>
            <a href="https://rabb565vef.expo.picard.replit.dev">Open CrystalFlow App</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://riqaitrcuiaplkdmnxlh.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_dqyDpFSmL8PHSN7Z80G8zg_zdzLA7Q6';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Check for access token in URL hash (Supabase sends it as a fragment)
        async function init() {
            const hash = window.location.hash;
            if (hash) {
                const params = new URLSearchParams(hash.substring(1));
                const accessToken = params.get('access_token');
                const refreshToken = params.get('refresh_token');
                const type = params.get('type');
                
                if (type === 'recovery' && accessToken) {
                    // Set the session from the recovery token
                    const { error } = await supabase.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken,
                    });
                    if (error) {
                        showError('Invalid or expired reset link. Please request a new one.');
                    }
                } else if (type === 'signup') {
                    // Email confirmation - redirect to app
                    document.getElementById('resetForm').style.display = 'none';
                    const successDiv = document.getElementById('successMsg');
                    successDiv.querySelector('h3').textContent = 'Email Confirmed';
                    successDiv.querySelector('p').textContent = 'Your email has been verified. You can now sign in to the CrystalFlow app.';
                    successDiv.style.display = 'block';
                }
            }
        }

        async function handleReset() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');
            
            hideError();
            
            if (!password || !confirm) {
                showError('Please fill in both fields.');
                return;
            }
            if (password.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }
            if (password !== confirm) {
                showError('Passwords do not match.');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Updating...';
            
            const { error } = await supabase.auth.updateUser({ password });
            
            if (error) {
                showError(error.message);
                btn.disabled = false;
                btn.textContent = 'Update Password';
                return;
            }
            
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMsg').style.display = 'none';
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleReset();
        });

        init();
    </script>
</body>
</html>
